name: Integration Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libsecret-1-dev python3

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'

      - name: Build QtKeychain
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cmake -S /tmp/qtkeychain -B /tmp/qtkeychain/build \
                -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DBUILD_TRANSLATIONS=OFF \
                -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build /tmp/qtkeychain/build -j"$(nproc)"
          cmake --install /tmp/qtkeychain/build

      - name: Build ngPost
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            lrelease "$ts" -qm "resources/lang/$(basename "$ts" .ts).qm"
          done
          qmake ngPost.pro CONFIG+=release
          make -j"$(nproc)"

      - name: Build integration tests
        run: |
          cd tests/integration
          qmake integration.pro CONFIG+=release
          make -j"$(nproc)"

      - name: Run integration tests
        env:
          NGPOST_BIN: ${{ github.workspace }}/src/ngPost
          QT_QPA_PLATFORM: offscreen
        run: |
          set -e
          fail=0
          found=0
          for t in tests/integration/tst_*/tst_*; do
            [ -x "$t" ] || continue
            found=$((found+1))
            echo "::group::$(basename "$t")"
            "$t" || fail=$((fail+1))
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No integration test binaries found"
            exit 1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "::error::$fail integration test binary/binaries failed"
            exit 1
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-linux
          path: |
            tests/integration/**/*.log
            tests/integration/**/Testing/**/*.xml
          if-no-files-found: ignore

  windows-mingw:
    name: Windows MinGW integration tests
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-python
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-charts

      - name: Build QtKeychain
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          sed -i 's|add_definitions( /utf-8 -DUNICODE )|add_definitions( -finput-charset=UTF-8 -fexec-charset=UTF-8 -DUNICODE )|' /tmp/qtkeychain/qtkeychain/CMakeLists.txt
          cmake -S /tmp/qtkeychain -B /tmp/qtkeychain/build \
                -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_WITH_QT6=ON -DBUILD_TESTING=OFF \
                -DBUILD_TRANSLATIONS=OFF \
                -DCMAKE_INSTALL_PREFIX=/mingw64
          cmake --build /tmp/qtkeychain/build -j2
          cmake --install /tmp/qtkeychain/build

      - name: Build ngPost
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            /mingw64/bin/lrelease.exe "$ts" -qm "resources/lang/$(basename "$ts" .ts).qm"
          done
          mkdir -p ../build/windows
          cp ngPost.ico ../build/windows/
          cd ../build/windows
          /mingw64/bin/qmake6.exe ../../src/ngPost.pro CONFIG+=release
          /mingw64/bin/mingw32-make.exe -j2

      - name: Build integration tests
        run: |
          cd tests/integration
          /mingw64/bin/qmake6.exe integration.pro CONFIG+=release
          /mingw64/bin/mingw32-make.exe -j2

      - name: Run integration tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          export NGPOST_BIN="$(cygpath -w "$(pwd)/build/windows/release/ngPost.exe")"
          fail=0
          found=0
          while IFS= read -r t; do
            found=$((found+1))
            echo "::group::$(basename "$t")"
            "$t" || fail=$((fail+1))
            echo "::endgroup::"
          done < <(find tests/integration -type f -name 'tst_*.exe')
          if [ "$found" -eq 0 ]; then
            echo "::error::No integration test binaries found"
            exit 1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "::error::$fail integration test binary/binaries failed"
            exit 1
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-windows
          path: |
            tests/integration/**/*.log
            tests/integration/**/Testing/**/*.xml
          if-no-files-found: ignore
