name: Development Project Build

on:
  push:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        # libsecret-1-dev is the Linux backend QtKeychain uses (GNOME
        # Secret Service / DBus). Without its headers the QtKeychain cmake
        # bails out with "package libsecret-1 not found".
        run: sudo apt update && sudo apt install -y build-essential cmake libsecret-1-dev
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(nproc)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
      - name: Build Project on Linux
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(nproc)
      - name: Build Tests on Linux
        run: |
          cd tests
          qmake6 tests.pro CONFIG+=release
          make -j$(nproc)
      - name: Run Unit + Integration Tests on Linux
        env:
          NGPOST_BIN: ${{ github.workspace }}/src/ngPost
          QT_QPA_PLATFORM: offscreen
        run: |
          set -e
          fail=0
          for t in tests/unit/tst_*/tst_* tests/integration/tst_*/tst_*; do
            [ -x "$t" ] || continue
            echo "::group::$(basename "$t")"
            "$t" || fail=$((fail+1))
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::$fail test binary/binaries failed"
            exit 1
          fi
      - name: Upload Test Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-linux
          path: |
            tests/**/*.log
            tests/**/Testing/**/*.xml
          if-no-files-found: ignore
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: src/ngPost

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.2.0'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
      - name: Build QtKeychain from source (Phase 4 dependency)
        shell: pwsh
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git $env:TEMP\qtkeychain
          cd $env:TEMP\qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON `
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$env:QT_ROOT_DIR"
          cmake --build build --config Release
          cmake --install build --config Release
      - name: Compile translations (.ts -> .qm)
        shell: pwsh
        run: |
          cd src
          New-Item -ItemType Directory -Force -Path resources/lang | Out-Null
          Get-ChildItem lang/ngPost_*.ts | ForEach-Object {
            lrelease $_.FullName -qm "resources/lang/$($_.BaseName).qm"
          }
      - name: Build Project on Windows with MSVC
        shell: pwsh
        run: |
          cd src
          Remove-Item -Force Makefile* -ErrorAction SilentlyContinue
          qmake ngPost.pro -spec win32-msvc CONFIG+="qtquickcompiler release use_hmi"
          nmake
      - name: Deploy Qt DLLs with windeployqt
        run: windeployqt src/release/ngPost.exe --release --qmldir src --compiler-runtime
      - name: Build Tests on Windows
        shell: pwsh
        run: |
          cd tests
          qmake tests.pro -spec win32-msvc CONFIG+=release
          nmake
      - name: Run Unit + Integration Tests on Windows
        shell: pwsh
        env:
          NGPOST_BIN: ${{ github.workspace }}/src/release/ngPost.exe
          QT_QPA_PLATFORM: offscreen
        run: |
          $fail = 0
          # Tests live as <category>/tst_<Name>/release/tst_<Name>.exe (or
          # directly under tst_<Name>/ depending on the qmake build dir) —
          # Get-ChildItem walks both.
          $tests = Get-ChildItem -Path tests\unit, tests\integration -Recurse -Filter 'tst_*.exe' -ErrorAction SilentlyContinue
          if (-not $tests) {
            Write-Host "::error::no test binaries found under tests\unit, tests\integration"
            exit 1
          }
          foreach ($t in $tests) {
            Write-Host "::group::$($t.Name)"
            & $t.FullName
            if ($LASTEXITCODE -ne 0) { $fail++ }
            Write-Host "::endgroup::"
          }
          if ($fail -ne 0) {
            Write-Host "::error::$fail test binary/binaries failed"
            exit 1
          }
      - name: Upload Test Logs on Failure (Windows)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows
          path: |
            tests/**/*.log
            tests/**/Testing/**/*.xml
          if-no-files-found: ignore
      - name: Clean Build Artifacts
        shell: pwsh
        run: |
          cd src/release
          Remove-Item -Force *.obj, *.cpp, *.rc, *.res, *.h, *.qrc -ErrorAction SilentlyContinue
      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: src/release/**

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'clang_64'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(sysctl -n hw.ncpu)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
      - name: Build Project on macOS
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
      - name: Build Tests on macOS
        run: |
          cd tests
          qmake tests.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
      - name: Run Unit + Integration Tests on macOS
        env:
          NGPOST_BIN: ${{ github.workspace }}/src/ngPost.app/Contents/MacOS/ngPost
          QT_QPA_PLATFORM: offscreen
        run: |
          set -e
          fail=0
          for t in tests/unit/tst_*/tst_* tests/integration/tst_*/tst_*; do
            [ -x "$t" ] || continue
            echo "::group::$(basename "$t")"
            "$t" || fail=$((fail+1))
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::$fail test binary/binaries failed"
            exit 1
          fi
      - name: Upload Test Logs on Failure (macOS)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-macos
          path: |
            tests/**/*.log
            tests/**/Testing/**/*.xml
          if-no-files-found: ignore
      - name: Upload macOS Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: src/ngPost.app/Contents/MacOS/ngPost

  collect-and-upload-binaries:
    name: Collect and Upload All Final Binaries
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
      - name: Upload Final Packed Binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          path: all-binaries/
