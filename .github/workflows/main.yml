name: Development Project Build

on:
  push:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential cmake
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b v0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(nproc)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
      - name: Build Project on Linux
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(nproc)
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: src/ngPost

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.2.0'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
      - name: Build QtKeychain from source (Phase 4 dependency)
        shell: pwsh
        run: |
          git clone --depth=1 -b v0.15.0 https://github.com/frankosterfeld/qtkeychain.git $env:TEMP\qtkeychain
          cd $env:TEMP\qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON `
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$env:QT_ROOT_DIR"
          cmake --build build --config Release
          cmake --install build --config Release
      - name: Compile translations (.ts -> .qm)
        shell: pwsh
        run: |
          cd src
          New-Item -ItemType Directory -Force -Path resources/lang | Out-Null
          Get-ChildItem lang/ngPost_*.ts | ForEach-Object {
            lrelease $_.FullName -qm "resources/lang/$($_.BaseName).qm"
          }
      - name: Build Project on Windows with MSVC
        shell: pwsh
        run: |
          cd src
          Remove-Item -Force Makefile* -ErrorAction SilentlyContinue
          qmake ngPost.pro -spec win32-msvc CONFIG+="qtquickcompiler release use_hmi"
          nmake
      - name: Deploy Qt DLLs with windeployqt
        run: windeployqt src/release/ngPost.exe --release --qmldir src --compiler-runtime
      - name: Clean Build Artifacts
        shell: pwsh
        run: |
          cd src/release
          Remove-Item -Force *.obj, *.cpp, *.rc, *.res, *.h, *.qrc -ErrorAction SilentlyContinue
      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: src/release/**

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'clang_64'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b v0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(sysctl -n hw.ncpu)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
      - name: Build Project on macOS
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
      - name: Upload macOS Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: src/ngPost.app/Contents/MacOS/ngPost

  collect-and-upload-binaries:
    name: Collect and Upload All Final Binaries
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
      - name: Upload Final Packed Binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          path: all-binaries/
