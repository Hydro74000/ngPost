name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libsecret-1-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'

      - name: Build QtKeychain
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cmake -S /tmp/qtkeychain -B /tmp/qtkeychain/build \
                -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DBUILD_TRANSLATIONS=OFF \
                -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build /tmp/qtkeychain/build -j"$(nproc)"
          cmake --install /tmp/qtkeychain/build

      - name: Compile translations
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            lrelease "$ts" -qm "resources/lang/$(basename "$ts" .ts).qm"
          done

      - name: Build
        run: |
          mkdir -p build/linux
          cd build/linux
          qmake ../../src/ngPost.pro CONFIG+=release
          make -j"$(nproc)"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ngPost-linux
          path: build/linux/ngPost

  windows-msvc:
    name: Windows MSVC app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.2.0'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcharts'

      - name: Build QtKeychain
        shell: pwsh
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git $env:TEMP\qtkeychain
          cd $env:TEMP\qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON `
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$env:QT_ROOT_DIR"
          cmake --build build --config Release
          cmake --install build --config Release

      - name: Compile translations
        shell: pwsh
        run: |
          cd src
          New-Item -ItemType Directory -Force -Path resources/lang | Out-Null
          Get-ChildItem lang/ngPost_*.ts | ForEach-Object {
            lrelease $_.FullName -qm "resources/lang/$($_.BaseName).qm"
          }

      - name: Build
        shell: pwsh
        run: |
          cd src
          qmake ngPost.pro -spec win32-msvc CONFIG+=release
          nmake

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ngPost-windows-msvc
          path: src/release/ngPost.exe

  macos:
    name: macOS app
    # Qt 6.8.2/qmake links AGL; the macOS 26 SDK no longer ships it.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'clang_64'
          modules: 'qtcharts'

      - name: Build QtKeychain
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cmake -S /tmp/qtkeychain -B /tmp/qtkeychain/build \
                -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DBUILD_TRANSLATIONS=OFF \
                -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build /tmp/qtkeychain/build -j"$(sysctl -n hw.ncpu)"
          cmake --install /tmp/qtkeychain/build

      - name: Compile translations
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            lrelease "$ts" -qm "resources/lang/$(basename "$ts" .ts).qm"
          done

      - name: Build
        run: |
          mkdir -p build/macos
          cd build/macos
          qmake ../../src/ngPost.pro CONFIG+=release
          make -j"$(sysctl -n hw.ncpu)"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ngPost-macos
          path: build/macos/ngPost.app/Contents/MacOS/ngPost
