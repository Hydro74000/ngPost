name: Build and Release

on:
  push:
    branches:
      - devel
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.2.3). Leave empty for a build-only (no release) run."
        required: false
        type: string
      publish:
        description: "Publish a GitHub release with the built artifacts. Leave unchecked to only build + upload run artifacts."
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the published release as a pre-release (only used when publish is checked and a version is given)."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-metadata:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.metadata.outputs.package_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      channel: ${{ steps.metadata.outputs.channel }}
      appimage_update_glob: ${{ steps.metadata.outputs.appimage_update_glob }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute release identity
        id: metadata
        env:
          RELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          PRERELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        run: |
          set -euo pipefail

          if [ -n "$RELEASE_INPUT" ]; then
            tag="$RELEASE_INPUT"
            package_version="$RELEASE_INPUT"
            channel="stable"
            appimage_update_glob="ngPost-*-x86_64.AppImage.zsync"
            if [ "$PRERELEASE_INPUT" = "true" ]; then
              prerelease="true"
              release_name="Pre-release $RELEASE_INPUT"
            else
              prerelease="false"
              release_name="Release $RELEASE_INPUT"
            fi
          elif [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            base_version="$(sed -nE 's/^[[:space:]]*VERSION[[:space:]]*=[[:space:]]*([0-9]+([.][0-9]+){1,2}).*/\1/p' src/ngPost_core.pri | head -1)"
            if [ -z "$base_version" ]; then
              echo "Unable to read VERSION from src/ngPost_core.pri" >&2
              exit 1
            fi
            tag="v${base_version}"
            package_version="v${base_version}"
            release_name="Release v${base_version}"
            prerelease="false"
            channel="stable"
            appimage_update_glob="ngPost-*-x86_64.AppImage.zsync"
          else
            base_version="$(sed -nE 's/^[[:space:]]*VERSION[[:space:]]*=[[:space:]]*([0-9]+(\.[0-9]+){1,2}).*/\1/p' src/ngPost_core.pri | head -1)"
            if [ -z "$base_version" ]; then
              echo "Unable to read VERSION from src/ngPost_core.pri" >&2
              exit 1
            fi

            date_id="$(date -u +%Y%m%d)"
            short_sha="$(git rev-parse --short=7 HEAD)"
            tag="v${base_version}-unstable.${date_id}.${GITHUB_RUN_NUMBER}.${short_sha}"
            package_version="$tag"
            release_name="Unstable $tag"
            prerelease="true"
            channel="unstable"
            appimage_update_glob="ngPost-v*-unstable.*-x86_64.AppImage.zsync"
          fi

          {
            echo "package_version=$package_version"
            echo "release_tag=$tag"
            echo "release_name=$release_name"
            echo "prerelease=$prerelease"
            echo "channel=$channel"
            echo "appimage_update_glob=$appimage_update_glob"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: release-metadata
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential cmake libsecret-1-dev
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(nproc)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
          ls -la resources/lang/
      - name: Build Project
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(nproc)
      - name: Package
        run: |
          VERSION="${{ needs.release-metadata.outputs.package_version }}"
          PKG="ngPost-${VERSION}-linux-x86_64"
          mkdir -p "dist/${PKG}"
          cp src/ngPost "dist/${PKG}/"
          cp ngPost.conf.example release_notes.txt README* THIRD_PARTY_LICENSES.md "dist/${PKG}/" 2>/dev/null || true
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          rm -rf "dist/${PKG}"
          ls -la dist/
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: dist/*.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: release-metadata
    steps:
      - uses: actions/checkout@v4
      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.2.0'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcharts'
      - name: Build QtKeychain from source (Phase 4 dependency)
        shell: pwsh
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git $env:TEMP\qtkeychain
          cd $env:TEMP\qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON `
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$env:QT_ROOT_DIR"
          cmake --build build --config Release
          cmake --install build --config Release
      - name: Compile translations (.ts -> .qm)
        shell: pwsh
        run: |
          cd src
          New-Item -ItemType Directory -Force -Path resources/lang | Out-Null
          Get-ChildItem lang/ngPost_*.ts | ForEach-Object {
            $qm = "resources/lang/$($_.BaseName).qm"
            lrelease $_.FullName -qm $qm
          }
          Get-ChildItem resources/lang/
      - name: Build Project on Windows with MSVC
        shell: pwsh
        run: |
          cd src
          Remove-Item -Force Makefile* -ErrorAction SilentlyContinue
          qmake ngPost.pro -spec win32-msvc CONFIG+="qtquickcompiler release use_hmi" DEFINES+="UNICODE _UNICODE WIN32 __USE_CONNECTION_TIMEOUT__ __COMPUTE_IMMEDIATE_SPEED__ __USE_TMP_RAM__ __RELEASE_ARTICLES_WHEN_CON_FAILS__"
          nmake
      - name: Deploy Qt DLLs with windeployqt
        run: windeployqt src/release/ngPost.exe --release --qmldir src --compiler-runtime
      - name: Ensure third-party Windows DLLs and plugins are deployed
        shell: pwsh
        run: |
          $qtKeychain = Get-ChildItem "$env:QT_ROOT_DIR" -Recurse -File -Include '*qt6keychain*.dll' |
            Select-Object -First 1
          if (-not $qtKeychain) {
            throw "qt6keychain DLL not found under QT_ROOT_DIR"
          }
          Copy-Item $qtKeychain.FullName src/release/ -Force

          $sqlitePlugin = Join-Path $env:QT_ROOT_DIR "plugins\sqldrivers\qsqlite.dll"
          if (-not (Test-Path $sqlitePlugin)) {
            throw "Qt SQLite plugin not found at $sqlitePlugin"
          }
          New-Item -ItemType Directory -Force -Path src/release/sqldrivers | Out-Null
          Copy-Item $sqlitePlugin src/release/sqldrivers/ -Force
      - name: Fetch ParPar for optional bundling
        shell: pwsh
        run: |
          # NgPost.cpp auto-detects an "embedded" parpar.exe sitting next to
          # ngPost.exe (see par2Candidates loop in NgPost::NgPost). We ship
          # ParPar specifically (not par2cmdline / par2cmdline-turbo) because
          # ngPost passes wildcard arguments like archive.7z* to the par2
          # binary on Windows. QProcess invokes CreateProcess directly with
          # no shell, so the binary has to do its own globbing —
          # par2cmdline-turbo currently doesn't, while ngPost's ParPar path
          # uses -R <folder> and avoids globbing entirely. ParPar is
          # released by animetosho into the public domain (CC0).
          #
          # parpar is staged outside src/release/ on purpose: src/release/*
          # is copied unconditionally by both the ZIP package and the Inno
          # Setup main [Files] entry. parpar.exe is wired into Inno Setup as
          # a task-gated extra source instead.
          $parparVersion = "0.4.5"
          $asset         = "parpar-v$parparVersion-win64.7z"
          $url           = "https://github.com/animetosho/ParPar/releases/download/v$parparVersion/$asset"
          $stage         = Join-Path (Get-Location) "dist\parpar"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP $asset
          Invoke-WebRequest -Uri $url -OutFile $archive
          # 7-Zip ships preinstalled on windows-latest runners. PowerShell's
          # Expand-Archive does not support .7z, so we shell out to 7z.exe.
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $sevenZip)) {
            throw "7-Zip not found at $sevenZip — runner image changed?"
          }
          $extract = Join-Path $env:RUNNER_TEMP "parpar-extract"
          Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          & $sevenZip x $archive "-o$extract" -y | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "7-Zip failed to extract $asset (exit $LASTEXITCODE)"
          }
          $parpar = Get-ChildItem $extract -Recurse -File -Filter 'parpar.exe' |
            Select-Object -First 1
          if (-not $parpar) {
            throw "parpar.exe not found inside $asset"
          }
          Copy-Item $parpar.FullName (Join-Path $stage 'parpar.exe') -Force
      - name: Bundle par2cmdline and MultiPar fallback tools
        shell: pwsh
        run: |
          # NgPost auto-detects parpar.exe -> par2.exe -> par2j64.exe sitting
          # next to ngPost.exe (see par2Candidates in NgPost::NgPost). ParPar is
          # the preferred, opt-out tool (staged in dist/parpar above). par2cmdline
          # and MultiPar are dropped UNCONDITIONALLY into src/release so PAR2
          # generation keeps working even when the user unticks ParPar at install
          # time. Both self-expand the archive.7z* / archive*rar wildcards ngPost
          # passes under QProcess's shell-less CreateProcess (verified).
          $release = "src/release"

          # par2cmdline 0.8.0 - vendored in-repo (release/libs), self-globs.
          $par2Zip = "release/libs/par2cmdline-0.8.0-win-x64.zip"
          if (-not (Test-Path $par2Zip)) { throw "Missing vendored $par2Zip" }
          $tmpPar2 = Join-Path $env:RUNNER_TEMP "par2cmdline"
          Remove-Item -Recurse -Force $tmpPar2 -ErrorAction SilentlyContinue
          Expand-Archive -Path $par2Zip -DestinationPath $tmpPar2 -Force
          $par2 = Get-ChildItem $tmpPar2 -Recurse -File -Filter 'par2.exe' |
            Select-Object -First 1
          if (-not $par2) { throw "par2.exe not found in $par2Zip" }
          Copy-Item $par2.FullName (Join-Path $release 'par2.exe') -Force

          # MultiPar (par2j64.exe) - GPL, official GitHub release.
          $mpVersion = "1.3.3.6"
          $mpAsset   = "MultiPar1336.zip"
          $mpUrl     = "https://github.com/Yutaka-Sawada/MultiPar/releases/download/v$mpVersion/$mpAsset"
          $mpArchive = Join-Path $env:RUNNER_TEMP $mpAsset
          Invoke-WebRequest -Uri $mpUrl -OutFile $mpArchive
          $tmpMp = Join-Path $env:RUNNER_TEMP "multipar"
          Remove-Item -Recurse -Force $tmpMp -ErrorAction SilentlyContinue
          Expand-Archive -Path $mpArchive -DestinationPath $tmpMp -Force
          $par2j = Get-ChildItem $tmpMp -Recurse -File -Filter 'par2j64.exe' |
            Select-Object -First 1
          if (-not $par2j) { throw "par2j64.exe not found in $mpAsset" }
          Copy-Item $par2j.FullName (Join-Path $release 'par2j64.exe') -Force
      - name: Clean Build Artifacts
        shell: pwsh
        run: |
          cd src/release
          Remove-Item -Force *.obj, *.cpp, *.rc, *.res, *.h, *.qrc -ErrorAction SilentlyContinue
      - name: Verify Windows deployment
        shell: pwsh
        run: |
          $root = Resolve-Path "src/release"

          # NB: Qt6DBus.dll is intentionally absent — QtKeychain only pulls in
          # QtDBus on Linux. On Windows it uses wincred, so nothing imports
          # Qt6DBus and windeployqt does not deploy it.
          $requiredFiles = @(
            "ngPost.exe",
            "Qt6Core.dll",
            "Qt6Gui.dll",
            "Qt6Network.dll",
            "Qt6Sql.dll",
            "Qt6Widgets.dll",
            "Qt6Charts.dll",
            "sqldrivers/qsqlite.dll",
            "platforms/qwindows.dll",
            "tls/qschannelbackend.dll"
          )
          foreach ($rel in $requiredFiles) {
            $path = Join-Path $root $rel
            if (-not (Test-Path $path)) {
              throw "Missing deployed dependency: $rel"
            }
          }
          if (-not (Get-ChildItem $root -File -Filter '*qt6keychain*.dll')) {
            throw "Missing deployed dependency: qt6keychain DLL"
          }
          # parpar.exe lives in dist/parpar (staged for the optional installer
          # task), not in src/release — the global Inno Setup [Files] entry
          # would otherwise copy it unconditionally.
          if (-not (Test-Path "dist/parpar/parpar.exe")) {
            throw "Missing staged parpar.exe (dist/parpar/parpar.exe)"
          }
          # par2cmdline + MultiPar are the always-installed PAR2 fallbacks.
          foreach ($fallback in @("par2.exe", "par2j64.exe")) {
            if (-not (Test-Path (Join-Path $root $fallback))) {
              throw "Missing bundled PAR2 fallback: $fallback"
            }
          }

          $expectedDlls = @(
            "Qt6Core.dll",
            "Qt6Gui.dll",
            "Qt6Network.dll",
            "Qt6Sql.dll",
            "Qt6Widgets.dll",
            "Qt6Charts.dll"
          )
          $dump = & dumpbin /DEPENDENTS "$root\ngPost.exe" 2>&1
          if ($LASTEXITCODE -ne 0) {
            $dump | Write-Output
            throw "dumpbin failed for ngPost.exe"
          }
          # Collapse the multi-line dumpbin output into one string. Against an
          # array, PowerShell's -match/-notmatch filter elements instead of
          # returning a boolean, which made the check always fire on the first
          # DLL.
          $dumpText = ($dump | Out-String)
          foreach ($dll in $expectedDlls) {
            if ($dumpText -notmatch [regex]::Escape($dll)) {
              throw "ngPost.exe does not declare expected dependency: $dll"
            }
          }
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Package
        shell: pwsh
        run: |
          $version = "${{ needs.release-metadata.outputs.package_version }}"
          $pkg = "ngPost-$version-windows-x86_64"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          Copy-Item -Recurse src/release/* "dist/$pkg/"
          # parpar is staged outside src/release/ so the Inno Setup installer
          # can gate it behind the optional "installparpar" task. For the
          # standalone ZIP we always include it — no install wizard to drive
          # the choice, and users who don't want it can just delete the file.
          Copy-Item dist/parpar/parpar.exe "dist/$pkg/parpar.exe" -Force
          Copy-Item ngPost.conf.example, release_notes.txt "dist/$pkg/" -ErrorAction SilentlyContinue
          Copy-Item README* "dist/$pkg/" -ErrorAction SilentlyContinue
          Copy-Item THIRD_PARTY_LICENSES.md "dist/$pkg/" -ErrorAction SilentlyContinue
          # Phase 5b: bundle PowerShell helpers for Windows-only WireGuard
          # tunnel registration. They run under UAC via Start-Process RunAs.
          New-Item -ItemType Directory -Force -Path "dist/$pkg/scripts/win" | Out-Null
          Copy-Item src/vpn/scripts/win/*.ps1 "dist/$pkg/scripts/win/"
          foreach ($helper in @("install-wg-tunnel.ps1", "uninstall-wg-tunnel.ps1")) {
            if (-not (Test-Path "dist/$pkg/scripts/win/$helper")) {
              throw "Missing Windows VPN helper in package: $helper"
            }
          }
          Compress-Archive -Path "dist/$pkg" -DestinationPath "dist/$pkg.zip"
          Get-ChildItem dist
      - name: Build Windows Setup
        shell: pwsh
        run: |
          $version = "${{ needs.release-metadata.outputs.package_version }}"
          $pkg = "ngPost-$version-windows-x86_64"
          $source = (Resolve-Path "dist/$pkg").Path
          $output = (Resolve-Path "dist").Path
          $icon = (Resolve-Path "src/ngPost.ico").Path
          # Phase 5 — chain-install the official OpenVPN Community and
          # WireGuard for Windows binaries. Their signed installers are
          # downloaded into a "deps" folder next to the setup output.
          $deps = (Resolve-Path "dist").Path + "\deps"
          New-Item -ItemType Directory -Force -Path $deps | Out-Null
          $ovpnUrl = "https://swupdate.openvpn.org/community/releases/OpenVPN-2.7.4-I001-amd64.msi"
          $wgUrl   = "https://download.wireguard.com/windows-client/wireguard-amd64-1.1.msi"
          $ovpnMsi = "$deps\openvpn.msi"
          $wgMsi   = "$deps\wireguard.msi"
          Invoke-WebRequest -Uri $ovpnUrl -OutFile $ovpnMsi
          Invoke-WebRequest -Uri $wgUrl   -OutFile $wgMsi

          # GPL notice file shown by Inno Setup before installation (LicenseFile page).
          # Covers the third-party VPN components bundled/chain-installed by this setup.
          $gplNoticePath = Join-Path (Get-Location) "gpl_notice.txt"
          Set-Content -Path $gplNoticePath -Encoding UTF8 -Value @"
          THIRD-PARTY SOFTWARE LICENCE NOTICES
          ======================================

          The optional VPN features of ngPost rely on the following third-party programs,
          distributed by their respective authors under the licences listed below.
          By selecting VPN backend installation you acknowledge these terms.

          ------------------------------------------------------------------------
          1. OpenVPN Community
          ------------------------------------------------------------------------
          Licence  : GNU General Public Licence, version 2 (with OpenSSL exception)
          Copyright: (c) 2002-2024 OpenVPN Inc. and contributors
          Source   : https://github.com/OpenVPN/openvpn

          OpenVPN is free software licensed under the GNU GPL v2. In addition, as a
          special exception, OpenVPN Inc. grants permission to link the code of this
          release with the OpenSSL library and distribute the resulting executables.
          Full GPL v2 text: https://www.gnu.org/licenses/old-licenses/gpl-2.0.html

          ------------------------------------------------------------------------
          2. WireGuard for Windows
          ------------------------------------------------------------------------
          Licence  : GNU General Public Licence, version 2 or later
          Copyright: (c) 2015-2024 Jason A. Donenfeld <Jason@zx2c4.com>
          Source   : https://git.zx2c4.com/wireguard-windows

          WireGuard for Windows is free software: you can redistribute it and/or
          modify it under the terms of the GNU GPL as published by the Free Software
          Foundation; either version 2 of the License, or (at your option) any later.
          Full GPL v2 text: https://www.gnu.org/licenses/old-licenses/gpl-2.0.html

          ------------------------------------------------------------------------
          3. ParPar (parpar.exe)
          ------------------------------------------------------------------------
          Licence  : Public Domain / CC0 1.0 Universal
          Copyright: released into the public domain by Anime Tosho
          Source   : https://github.com/animetosho/ParPar

          ParPar is a high-performance PAR2 creation tool released into the public
          domain. Where public domain is not recognised, the project applies the
          CC0 1.0 dedication. Full text: https://creativecommons.org/publicdomain/zero/1.0/

          ------------------------------------------------------------------------
          4. par2cmdline (par2.exe)
          ------------------------------------------------------------------------
          Licence  : GNU General Public Licence, version 2 or later
          Copyright: (c) 2003 Peter Brian Clements and contributors
          Source   : https://github.com/Parchive/par2cmdline

          par2cmdline is the reference PAR2 creation/verification tool. It is bundled
          as the always-available fallback used when ParPar is not installed.
          Full GPL v2 text: https://www.gnu.org/licenses/old-licenses/gpl-2.0.html

          ------------------------------------------------------------------------
          5. MultiPar (par2j64.exe)
          ------------------------------------------------------------------------
          Licence  : GNU General Public Licence
          Copyright: (c) Yutaka Sawada
          Source   : https://github.com/Yutaka-Sawada/MultiPar

          MultiPar's par2j64.exe is a fast PAR2 client bundled as an alternative
          PAR2 backend (selectable via PAR2_PATH).
          Full GPL text: https://www.gnu.org/licenses/old-licenses/gpl-2.0.html

          ------------------------------------------------------------------------

          These programs are independent products; ngPost does not modify them and
          invokes them as separate processes. Their source code is available at the
          URLs above. A full summary is in THIRD_PARTY_LICENSES.md, installed
          alongside ngPost.
          "@

          $iss = @"
          [Setup]
          AppId={{2E2A4868-85FE-4FC1-984A-0B051B78937D}
          AppName=ngPost
          AppVersion=$version
          AppPublisher=Hydro74000
          AppPublisherURL=https://github.com/Hydro74000/ngPost
          AppSupportURL=https://github.com/Hydro74000/ngPost/issues
          AppUpdatesURL=https://github.com/Hydro74000/ngPost/releases
          DefaultDirName={autopf}\ngPost
          DefaultGroupName=ngPost
          DisableProgramGroupPage=yes
          OutputDir=$output
          OutputBaseFilename=$pkg-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          SetupIconFile=$icon
          UninstallDisplayIcon={app}\ngPost.exe
          WizardStyle=modern
          LicenseFile=$gplNoticePath

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked
          Name: "installparpar"; Description: "Install ParPar (recommended for PAR2 redundancy generation)"; GroupDescription: "Optional tools (recommended):"
          Name: "installopenvpn"; Description: "Install OpenVPN Community (required for OpenVPN profiles)"; GroupDescription: "VPN backends (recommended):"
          Name: "installwireguard"; Description: "Install WireGuard for Windows (required for WireGuard profiles)"; GroupDescription: "VPN backends (recommended):"

          [Files]
          ; parpar.exe is excluded here and re-added below under Tasks:
          ; installparpar so the user can opt out at install time.
          Source: "$source\*"; DestDir: "{app}"; Excludes: "parpar.exe"; Flags: ignoreversion recursesubdirs createallsubdirs
          Source: "$source\parpar.exe"; DestDir: "{app}"; Flags: ignoreversion; Tasks: installparpar
          Source: "THIRD_PARTY_LICENSES.md"; DestDir: "{app}"; Flags: ignoreversion
          Source: "$ovpnMsi"; DestDir: "{tmp}"; Flags: deleteafterinstall; Tasks: installopenvpn; Check: OpenVpnNeeded
          Source: "$wgMsi"; DestDir: "{tmp}"; Flags: deleteafterinstall; Tasks: installwireguard; Check: WireGuardNeeded

          [Icons]
          ; Flat Start Menu entry — appears directly under All Apps without a
          ; subfolder, plus the legacy {group} one for users who like grouping.
          Name: "{autoprograms}\ngPost"; Filename: "{app}\ngPost.exe"; WorkingDir: "{app}"
          Name: "{group}\ngPost"; Filename: "{app}\ngPost.exe"; WorkingDir: "{app}"
          Name: "{group}\Uninstall ngPost"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\ngPost"; Filename: "{app}\ngPost.exe"; WorkingDir: "{app}"; Tasks: desktopicon

          [Run]
          ; Chain-install OpenVPN Community without the vendor tray GUI.
          ; ngPost drives openvpn.exe through OpenVPNServiceInteractive and its
          ; own VPN profile UI, so OpenVPN.GUI / OpenVPN.GUI.OnLogon would only
          ; add a startup tray app that complains when OpenVPN's config dir is empty.
          Filename: "msiexec.exe"; Parameters: "/i ""{tmp}\openvpn.msi"" /qb! /norestart ADDLOCAL=OpenVPN,Drivers,Drivers.OvpnDco,Drivers.TAPWindows6"; StatusMsg: "Installing OpenVPN Community..."; Tasks: installopenvpn; Check: OpenVpnNeeded
          ; OpenVPN MSI registers OpenVPNServiceInteractive as Start=Manual.
          ; ngPost talks to this service via named pipe, so make it auto-start
          ; on boot and bring it up now.
          Filename: "sc.exe"; Parameters: "config OpenVPNServiceInteractive start= auto"; Flags: runhidden waituntilterminated; Tasks: installopenvpn; Check: OpenVpnNeeded
          Filename: "sc.exe"; Parameters: "start OpenVPNServiceInteractive"; Flags: runhidden waituntilterminated; Tasks: installopenvpn; Check: OpenVpnNeeded
          ; Chain-install WireGuard for Windows silently (with Wintun driver + manager service)
          Filename: "msiexec.exe"; Parameters: "/i ""{tmp}\wireguard.msi"" /qb! /norestart DO_NOT_LAUNCH=1"; StatusMsg: "Installing WireGuard for Windows..."; Tasks: installwireguard; Check: WireGuardNeeded
          Filename: "{app}\ngPost.exe"; Description: "Launch ngPost"; Flags: nowait postinstall skipifsilent

          [Code]
          // Detect pre-existing OpenVPN Community / WireGuard for Windows.
          // The result is cached in global vars at InitializeSetup time and
          // referenced via Check: predicates on [Files] and [Run] so even if
          // the user re-checks a task in the wizard the actual install is
          // skipped. We also try to relabel the task in the wizard for clarity.
          var
            OpenVpnDetected: Boolean;
            WireGuardDetected: Boolean;

          function InitializeSetup(): Boolean;
          begin
            OpenVpnDetected :=
                RegKeyExists(HKLM, 'SYSTEM\CurrentControlSet\Services\OpenVPNServiceInteractive')
             or FileExists(ExpandConstant('{commonpf}\OpenVPN\bin\openvpn.exe'))
             or FileExists(ExpandConstant('{commonpf32}\OpenVPN\bin\openvpn.exe'));
            WireGuardDetected :=
                FileExists(ExpandConstant('{commonpf}\WireGuard\wireguard.exe'))
             or FileExists(ExpandConstant('{commonpf32}\WireGuard\wireguard.exe'));
            Result := True;
          end;

          function OpenVpnNeeded(): Boolean;
          begin
            Result := not OpenVpnDetected;
          end;

          function WireGuardNeeded(): Boolean;
          begin
            Result := not WireGuardDetected;
          end;

          procedure InitializeWizard();
          var
            i: Integer;
            s: String;
          begin
            for i := 0 to WizardForm.TasksList.Items.Count - 1 do begin
              s := WizardForm.TasksList.Items[i];
              if (Pos('OpenVPN Community', s) > 0) and OpenVpnDetected then begin
                WizardForm.TasksList.Checked[i] := False;
                WizardForm.TasksList.Items[i] := s + ' [already installed]';
              end;
              if (Pos('WireGuard for Windows', s) > 0) and WireGuardDetected then begin
                WizardForm.TasksList.Checked[i] := False;
                WizardForm.TasksList.Items[i] := s + ' [already installed]';
              end;
            end;
          end;

          // No PAR2_PATH seeding is needed: the installer ships only
          // ngPost.conf.example (a reference template, not an active config),
          // so ngPost regenerates a fresh ngPost.conf in the per-user config
          // dir on first launch. Its runtime auto-detection then picks up the
          // bundled parpar.exe / par2.exe / par2j64.exe sitting next to
          // ngPost.exe (see par2Candidates in NgPost::NgPost).
          "@
          Set-Content -Path installer.iss -Value $iss -Encoding ASCII
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss
          Remove-Item -Recurse -Force "dist/$pkg"
          Get-ChildItem dist
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: |
            dist/*.zip
            dist/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: release-metadata
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'clang_64'
          modules: 'qtcharts'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(sysctl -n hw.ncpu)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
          ls -la resources/lang/
      - name: Build Project on macOS
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
      - name: Bundle Qt frameworks into .app
        run: macdeployqt src/ngPost.app
      - name: Package
        run: |
          VERSION="${{ needs.release-metadata.outputs.package_version }}"
          PKG="ngPost-${VERSION}-macos"
          mkdir -p dist
          cd src
          zip -qr "../dist/${PKG}.zip" ngPost.app
          cd ..
          zip -qj "dist/${PKG}.zip" THIRD_PARTY_LICENSES.md
          ls -la dist/
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: dist/*.zip

  build-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-24.04
    needs: release-metadata
    steps:
      - uses: actions/checkout@v4
      - name: Install build & runtime dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake libfuse2t64 wget file patchelf desktop-file-utils \
            libssl3t64 openssl \
            par2 \
            openvpn wireguard-tools wireguard-go \
            libsecret-1-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0
      - name: Install Go for wireguard-go fallback
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Build wireguard-go fallback
        run: |
          if command -v wireguard-go >/dev/null 2>&1; then
            wireguard-go --version || true
            exit 0
          fi

          git clone --depth=1 https://git.zx2c4.com/wireguard-go /tmp/wireguard-go
          make -C /tmp/wireguard-go
          sudo install -m 755 /tmp/wireguard-go/wireguard-go /usr/local/bin/wireguard-go
          wireguard-go --version || true
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'
      - name: Build QtKeychain from source (Phase 4 dependency)
        run: |
          git clone --depth=1 -b 0.15.0 https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cd /tmp/qtkeychain
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_QT6=ON \
                -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          cmake --build build -j$(nproc)
          cmake --install build
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
          ls -la resources/lang/
      - name: Build Project
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(nproc)
      - name: Prepare AppDir
        run: |
          resolve_bin() {
            local label="$1"
            shift

            local candidate
            for candidate in "$@"; do
              if command -v "$candidate" >/dev/null 2>&1; then
                command -v "$candidate"
                return 0
              fi
            done

            find /usr/local/bin /usr/local/sbin /usr/bin /usr/sbin /bin /sbin \
              -maxdepth 1 -type f -name "$label" -perm -111 2>/dev/null | head -1
          }

          install_bin() {
            local label="$1"
            local target="$2"
            shift 2

            local source
            source="$(resolve_bin "$label" "$@")"
            if [ -z "$source" ]; then
              echo "ERROR: unable to find required binary '$label' (tried: $*)" >&2
              exit 1
            fi

            echo "Bundling $label from $source"
            cp "$source" "$target"
            chmod 755 "$target"
          }

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/bin/vpn
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src/ngPost AppDir/usr/bin/
          install_bin par2 AppDir/usr/bin/par2 par2 par2create par2repair
          if [ -x tools/rar ]; then
            cp tools/rar AppDir/usr/bin/rar
          fi
          # Bundle VPN binaries next to ngPost. Code path: applicationDirPath()/vpn/<bin>
          # On AppImage, applicationDirPath = $APPDIR/usr/bin so this lands at
          # /usr/bin/vpn/{openvpn,wireguard-go,wg} inside the squashfs.
          install_bin openvpn AppDir/usr/bin/vpn/openvpn openvpn
          install_bin wireguard-go AppDir/usr/bin/vpn/wireguard-go wireguard-go
          install_bin wg AppDir/usr/bin/vpn/wg wg
          # VPN runtime: helper + install/uninstall scripts + polkit rule
          # template. All next to the ngPost binary so the user-mode dialog
          # can locate them via applicationDirPath() and pass them to pkexec
          # for the one-time install.
          cp src/vpn/scripts/ngpost-vpn-helper.sh    AppDir/usr/bin/
          cp src/vpn/scripts/ngpost-vpn-install.sh   AppDir/usr/bin/
          cp src/vpn/scripts/ngpost-vpn-uninstall.sh AppDir/usr/bin/
          cp src/vpn/polkit/49-ngpost-vpn.rules.in   AppDir/usr/bin/
          chmod 755 AppDir/usr/bin/ngpost-vpn-*.sh
          chmod 644 AppDir/usr/bin/49-ngpost-vpn.rules.in
          cp ngPost.desktop AppDir/usr/share/applications/
          cp src/resources/icons/ngPost.png AppDir/usr/share/icons/hicolor/256x256/apps/
          cp src/resources/icons/ngPost.png AppDir/
          cp ngPost.desktop AppDir/
          cp ngPost.conf.example release_notes.txt README* THIRD_PARTY_LICENSES.md AppDir/ || true
      - name: Locate OpenSSL libraries
        id: openssl
        run: |
          SSL=$(find /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu -maxdepth 1 -name 'libssl.so.3' 2>/dev/null | head -1)
          CRYPTO=$(find /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu -maxdepth 1 -name 'libcrypto.so.3' 2>/dev/null | head -1)
          test -n "$SSL" && test -n "$CRYPTO" || { echo "OpenSSL libs not found"; exit 1; }
          echo "ssl=$SSL"       >> $GITHUB_OUTPUT
          echo "crypto=$CRYPTO" >> $GITHUB_OUTPUT
      - name: Locate QtKeychain library
        id: qtkeychain
        run: |
          # Phase 4 dep: cross-platform credential store.
          # We compile QtKeychain from source into $QT_ROOT_DIR earlier,
          # so the .so lives under $QT_ROOT_DIR/lib (with the system lib
          # path as a fallback for distros that ship the package).
          KC=$(find "$QT_ROOT_DIR/lib" /usr/lib/x86_64-linux-gnu \
                 /lib/x86_64-linux-gnu -maxdepth 2 \
                 -name 'libqt6keychain.so*' 2>/dev/null | sort | head -1)
          test -n "$KC" || { echo "libqt6keychain not found"; exit 1; }
          echo "kc=$KC" >> $GITHUB_OUTPUT
      - name: Download linuxdeployqt
        run: |
          wget -q -O linuxdeployqt https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt
      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
      - name: Build AppImage
        env:
          # Qt 6 dlopen plugins that linuxdeploy-plugin-qt won't pick up automatically
          EXTRA_QT_PLUGINS: "tls;networkinformation"
          LDAI_OUTPUT: ngPost-${{ needs.release-metadata.outputs.package_version }}-x86_64.AppImage
          # Embed update info into the ELF + emit a .zsync file alongside the AppImage.
          # Format: gh-releases-zsync|<user>|<repo>|<tag>|<glob>
          # Using "latest" => AppImageUpdate fetches the latest GitHub release each check.
          # The filename glob is channel-aware so unstable builds only follow unstable assets.
          UPDATE_INFORMATION: "gh-releases-zsync|Hydro74000|ngPost|latest|${{ needs.release-metadata.outputs.appimage_update_glob }}"
          LDAI_UPDATE_INFORMATION: "gh-releases-zsync|Hydro74000|ngPost|latest|${{ needs.release-metadata.outputs.appimage_update_glob }}"
        run: |
          # QT_ROOT_DIR is exported by jurplel/install-qt-action — resolve in shell, not in env:
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          # Restrict to Qt's lib dir so unrelated tool-cache libs aren't candidates
          export LD_LIBRARY_PATH="$QT_ROOT_DIR/lib"
          # Remove Mimer SQL plugin: libqsqlmimer.so requires libmimerapi.so which
          # is not available on the runner and would cause linuxdeploy to abort.
          find "$QT_ROOT_DIR" -name 'libqsqlmimer*' -delete
          ./linuxdeploy \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --library "${{ steps.openssl.outputs.ssl }}" \
            --library "${{ steps.openssl.outputs.crypto }}" \
            --library "${{ steps.qtkeychain.outputs.kc }}" \
            --executable AppDir/usr/bin/par2 \
            --executable AppDir/usr/bin/vpn/openvpn \
            --executable AppDir/usr/bin/vpn/wireguard-go \
            --executable AppDir/usr/bin/vpn/wg \
            --desktop-file AppDir/usr/share/applications/ngPost.desktop \
            --icon-file AppDir/ngPost.png
          mkdir -p dist
          mv *.AppImage *.AppImage.zsync dist/
          ls -la dist/
          # Hard fail if zsync file wasn't generated (means UPDATE_INFORMATION wasn't picked up)
          test -f dist/*.AppImage.zsync || { echo "ERROR: .zsync file not generated"; exit 1; }
      - name: Verify AppImage is self-contained & update-info embedded
        env:
          APPIMAGE_UPDATE_GLOB: ${{ needs.release-metadata.outputs.appimage_update_glob }}
        run: |
          cd dist
          APPIMAGE=$(ls *.AppImage)
          ./"$APPIMAGE" --appimage-extract >/dev/null
          export LD_LIBRARY_PATH="$PWD/squashfs-root/usr/lib:$PWD/squashfs-root/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          while IFS= read -r -d '' elf; do
            if file "$elf" | grep -q 'ELF'; then
              if ldd "$elf" 2>&1 | grep -q 'not found'; then
                echo "ERROR: unresolved shared libraries for $elf"
                ldd "$elf" || true
                exit 1
              fi
            fi
          done < <(find squashfs-root/usr/bin squashfs-root/usr/plugins -type f -perm -111 -print0)
          for lib in Core Gui Network Widgets Charts Sql DBus; do
            ls squashfs-root/usr/lib/libQt6${lib}.so* >/dev/null 2>&1 || {
              echo "ERROR: libQt6${lib} not bundled"; exit 1;
            }
          done
          test -f squashfs-root/usr/lib/libssl.so.3    || { echo "ERROR: libssl.so.3 not bundled";    exit 1; }
          test -f squashfs-root/usr/lib/libcrypto.so.3 || { echo "ERROR: libcrypto.so.3 not bundled"; exit 1; }
          ls squashfs-root/usr/lib/libqt6keychain.so* >/dev/null 2>&1 || { echo "ERROR: libqt6keychain not bundled"; exit 1; }
          test -f squashfs-root/usr/plugins/sqldrivers/libqsqlite.so || { echo "ERROR: Qt SQLite plugin not bundled"; exit 1; }
          test -f squashfs-root/usr/plugins/platforms/libqxcb.so     || { echo "ERROR: Qt xcb platform plugin not bundled"; exit 1; }
          ls squashfs-root/usr/plugins/tls/ 2>/dev/null || { echo "ERROR: Qt TLS plugins not bundled"; exit 1; }
          # VPN binaries must be present at the path my code looks up first
          test -x squashfs-root/usr/bin/vpn/openvpn      || { echo "ERROR: openvpn not bundled";      exit 1; }
          test -x squashfs-root/usr/bin/vpn/wireguard-go || { echo "ERROR: wireguard-go not bundled"; exit 1; }
          test -x squashfs-root/usr/bin/vpn/wg           || { echo "ERROR: wg not bundled";           exit 1; }
          # Privileged helper + install/uninstall + polkit rule template
          test -x squashfs-root/usr/bin/ngpost-vpn-helper.sh    || { echo "ERROR: helper script not bundled";    exit 1; }
          test -x squashfs-root/usr/bin/ngpost-vpn-install.sh   || { echo "ERROR: install script not bundled";   exit 1; }
          test -x squashfs-root/usr/bin/ngpost-vpn-uninstall.sh || { echo "ERROR: uninstall script not bundled"; exit 1; }
          test -f squashfs-root/usr/bin/49-ngpost-vpn.rules.in  || { echo "ERROR: polkit rule template not bundled"; exit 1; }
          # Check the update-information string is embedded in the ELF
          expected_update_info="gh-releases-zsync|Hydro74000|ngPost|latest|$APPIMAGE_UPDATE_GLOB"
          if ! strings "$APPIMAGE" | grep -Fq "$expected_update_info"; then
            echo "ERROR: UPDATE_INFORMATION not embedded in AppImage ELF"; exit 1
          fi
          # Check .zsync file is present and references the AppImage
          test -f "$APPIMAGE.zsync" || { echo "ERROR: zsync file missing"; exit 1; }
          grep -q "^Filename: $APPIMAGE" "$APPIMAGE.zsync" || { echo "ERROR: zsync does not reference $APPIMAGE"; exit 1; }
          rm -rf squashfs-root
          echo "AppImage is self-contained, update-info embedded, zsync file present."
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-linux
          path: |
            dist/*.AppImage
            dist/*.AppImage.zsync

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [release-metadata, build-linux, build-windows, build-macos, build-appimage]
    # Push to master/devel always publishes. A manual workflow_dispatch only
    # publishes when its "publish" input is checked — leaving it unchecked
    # gives a build-only run (artifacts uploaded, no GitHub release created).
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.release-metadata.outputs.release_name }}
          CHANNEL: ${{ needs.release-metadata.outputs.channel }}
          PRERELEASE: ${{ needs.release-metadata.outputs.prerelease }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          previous_tag=""
          if [ "$CHANNEL" = "unstable" ]; then
            previous_tag="$(gh release list --limit 100 --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease and (.tagName | test("-unstable\\.")))][0].tagName // ""')"
          fi

          if [ -z "$previous_tag" ]; then
            previous_tag="$(gh release list --limit 100 --json tagName \
              --jq '.[0].tagName // ""')"
          fi

          range=""
          if [ -n "$previous_tag" ] && git rev-parse -q --verify "refs/tags/$previous_tag" >/dev/null; then
            range="${previous_tag}..HEAD"
          fi

          if [ -n "$range" ]; then
            git log "$range" --no-merges --pretty=format:'- %s (%h)' | sed '/^- $/d' > commits.md
          else
            git log --no-merges --pretty=format:'- %s (%h)' | sed '/^- $/d' > commits.md
          fi

          if [ ! -s commits.md ]; then
            printf '%s\n' '- No commit found since the previous release.' > commits.md
          fi

          {
            echo "# ${RELEASE_NAME}"
            echo
            echo "- Channel: ${CHANNEL}"
            echo "- Commit: ${GITHUB_SHA}"
            if [ -n "$previous_tag" ]; then
              echo "- Previous release: ${previous_tag}"
            else
              echo "- Previous release: none found"
            fi
            echo
            echo "## Changes since previous release"
            echo
            cat commits.md
            echo
          } > release-body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-metadata.outputs.release_tag }}
          name: ${{ needs.release-metadata.outputs.release_name }}
          draft: false
          prerelease: ${{ needs.release-metadata.outputs.prerelease }}
          body_path: release-body.md
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}