name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y build-essential
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
          ls -la resources/lang/
      - name: Build Project
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(nproc)
      - name: Package
        run: |
          VERSION="${{ inputs.version }}"
          PKG="ngPost-${VERSION}-linux-x86_64"
          mkdir -p "dist/${PKG}"
          cp src/ngPost "dist/${PKG}/"
          cp ngPost.conf release_notes.txt README* "dist/${PKG}/" 2>/dev/null || true
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          rm -rf "dist/${PKG}"
          ls -la dist/
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: dist/*.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.2.0'
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
      - name: Compile translations (.ts -> .qm)
        shell: pwsh
        run: |
          cd src
          New-Item -ItemType Directory -Force -Path resources/lang | Out-Null
          Get-ChildItem lang/ngPost_*.ts | ForEach-Object {
            $qm = "resources/lang/$($_.BaseName).qm"
            lrelease $_.FullName -qm $qm
          }
          Get-ChildItem resources/lang/
      - name: Build Project on Windows with MSVC
        shell: pwsh
        run: |
          cd src
          Remove-Item -Force Makefile* -ErrorAction SilentlyContinue
          $appVersion = "${{ inputs.version }}".TrimStart('v')
          qmake ngPost.pro -spec win32-msvc CONFIG+="qtquickcompiler release use_hmi" DEFINES+="UNICODE _UNICODE WIN32 APP_VERSION=$appVersion __USE_CONNECTION_TIMEOUT__ __COMPUTE_IMMEDIATE_SPEED__ __USE_TMP_RAM__ __RELEASE_ARTICLES_WHEN_CON_FAILS__"
          nmake
      - name: Deploy Qt DLLs with windeployqt
        run: windeployqt src/release/ngPost.exe --release --qmldir src --compiler-runtime
      - name: Clean Build Artifacts
        shell: pwsh
        run: |
          cd src/release
          Remove-Item -Force *.obj, *.cpp, *.rc, *.res, *.h, *.qrc -ErrorAction SilentlyContinue
      - name: Package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $pkg = "ngPost-$version-windows-x86_64"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          Copy-Item -Recurse src/release/* "dist/$pkg/"
          Copy-Item ngPost.conf, release_notes.txt "dist/$pkg/" -ErrorAction SilentlyContinue
          Copy-Item README* "dist/$pkg/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$pkg" -DestinationPath "dist/$pkg.zip"
          Remove-Item -Recurse -Force "dist/$pkg"
          Get-ChildItem dist
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: dist/*.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'clang_64'
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
          ls -la resources/lang/
      - name: Build Project on macOS
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)
      - name: Bundle Qt frameworks into .app
        run: macdeployqt src/ngPost.app
      - name: Package
        run: |
          VERSION="${{ inputs.version }}"
          PKG="ngPost-${VERSION}-macos"
          mkdir -p dist
          cd src
          zip -qr "../dist/${PKG}.zip" ngPost.app
          cd ..
          ls -la dist/
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: dist/*.zip

  build-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build & runtime dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential libfuse2 wget file patchelf desktop-file-utils \
            libssl3 openssl \
            par2 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'linux_gcc_64'
      - name: Compile translations (.ts -> .qm)
        run: |
          cd src
          mkdir -p resources/lang
          for ts in lang/ngPost_*.ts; do
            base=$(basename "$ts" .ts)
            lrelease "$ts" -qm "resources/lang/${base}.qm"
          done
          ls -la resources/lang/
      - name: Build Project
        run: |
          cd src
          qmake ngPost.pro CONFIG+=release
          make -j$(nproc)
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src/ngPost AppDir/usr/bin/
          cp "$(which par2)" AppDir/usr/bin/par2
          if [ -x tools/rar ]; then
            cp tools/rar AppDir/usr/bin/rar
          fi
          cp ngPost.desktop AppDir/usr/share/applications/
          cp src/resources/icons/ngPost.png AppDir/usr/share/icons/hicolor/256x256/apps/
          cp src/resources/icons/ngPost.png AppDir/
          cp ngPost.desktop AppDir/
          cp ngPost.conf release_notes.txt README* AppDir/ || true
      - name: Locate OpenSSL libraries
        id: openssl
        run: |
          SSL=$(find /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu -maxdepth 1 -name 'libssl.so.3' 2>/dev/null | head -1)
          CRYPTO=$(find /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu -maxdepth 1 -name 'libcrypto.so.3' 2>/dev/null | head -1)
          test -n "$SSL" && test -n "$CRYPTO" || { echo "OpenSSL libs not found"; exit 1; }
          echo "ssl=$SSL"       >> $GITHUB_OUTPUT
          echo "crypto=$CRYPTO" >> $GITHUB_OUTPUT
      - name: Download linuxdeployqt
        run: |
          wget -q -O linuxdeployqt https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt
      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
      - name: Build AppImage
        env:
          # Qt 6 dlopen plugins that linuxdeploy-plugin-qt won't pick up automatically
          EXTRA_QT_PLUGINS: "tls;networkinformation"
          LDAI_OUTPUT: ngPost-${{ inputs.version }}-x86_64.AppImage
          # Embed update info into the ELF + emit a .zsync file alongside the AppImage.
          # Format: gh-releases-zsync|<user>|<repo>|<tag>|<glob>
          # Using "latest" => AppImageUpdate fetches the latest GitHub release each check.
          UPDATE_INFORMATION: "gh-releases-zsync|Hydro74000|ngPost|latest|ngPost-*-x86_64.AppImage.zsync"
          LDAI_UPDATE_INFORMATION: "gh-releases-zsync|Hydro74000|ngPost|latest|ngPost-*-x86_64.AppImage.zsync"
        run: |
          # QT_ROOT_DIR is exported by jurplel/install-qt-action — resolve in shell, not in env:
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          # Restrict to Qt's lib dir so unrelated tool-cache libs aren't candidates
          export LD_LIBRARY_PATH="$QT_ROOT_DIR/lib"
          ./linuxdeploy \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --library "${{ steps.openssl.outputs.ssl }}" \
            --library "${{ steps.openssl.outputs.crypto }}" \
            --executable AppDir/usr/bin/par2 \
            --desktop-file AppDir/usr/share/applications/ngPost.desktop \
            --icon-file AppDir/ngPost.png
          mkdir -p dist
          mv *.AppImage *.AppImage.zsync dist/
          ls -la dist/
          # Hard fail if zsync file wasn't generated (means UPDATE_INFORMATION wasn't picked up)
          test -f dist/*.AppImage.zsync || { echo "ERROR: .zsync file not generated"; exit 1; }
      - name: Verify AppImage is self-contained & update-info embedded
        run: |
          cd dist
          APPIMAGE=$(ls *.AppImage)
          ./"$APPIMAGE" --appimage-extract >/dev/null
          test -f squashfs-root/usr/lib/libssl.so.3    || { echo "ERROR: libssl.so.3 not bundled";    exit 1; }
          test -f squashfs-root/usr/lib/libcrypto.so.3 || { echo "ERROR: libcrypto.so.3 not bundled"; exit 1; }
          ls squashfs-root/usr/plugins/tls/ 2>/dev/null || { echo "ERROR: Qt TLS plugins not bundled"; exit 1; }
          # Check the update-information string is embedded in the ELF
          if ! strings "$APPIMAGE" | grep -q "gh-releases-zsync|Hydro74000|ngPost|"; then
            echo "ERROR: UPDATE_INFORMATION not embedded in AppImage ELF"; exit 1
          fi
          # Check .zsync file is present and references the AppImage
          test -f "$APPIMAGE.zsync" || { echo "ERROR: zsync file missing"; exit 1; }
          grep -q "^Filename: $APPIMAGE" "$APPIMAGE.zsync" || { echo "ERROR: zsync does not reference $APPIMAGE"; exit 1; }
          rm -rf squashfs-root
          echo "AppImage is self-contained, update-info embedded, zsync file present."
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage-linux
          path: |
            dist/*.AppImage
            dist/*.AppImage.zsync

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, build-appimage]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
